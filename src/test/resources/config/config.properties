# ── GreenKart Automation Config ───────────────────────────────────────────────
# Base config; values are overridden by system properties (Maven / Jenkins CLI)

# Application
base.url=https://rahulshettyacademy.com/seleniumPractise/
env=staging

# Browser
browser=chrome
headless=false

# Waits (seconds)
implicit.wait=10
explicit.wait=15

# DB (optional – needed only for DB utility tests)
db.url=jdbc:mysql://localhost:3306/greenkart
db.username=root
db.password=

# Reporting
reports.dir=test-output/reports/
screenshots.dir=test-output/screenshots/
